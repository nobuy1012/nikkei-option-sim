<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日経オプション 損益シミュレーター</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#171b26;--surface2:#1e2333;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--text:#e8eaf0;--muted:#7b8099;--accent:#4f8ef7;--green:#3ecf8e;--red:#f76e6e;--amber:#f7c948;--sell-bg:rgba(247,110,110,0.08);--buy-bg:rgba(62,207,142,0.08);--sell-border:rgba(247,110,110,0.25);--buy-border:rgba(62,207,142,0.25);--radius:8px;--radius-lg:12px;--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans JP',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{font-family:var(--sans);font-size:14px;color:var(--text);background:var(--bg);min-height:100vh;padding:1.5rem}
h1{font-family:var(--mono);font-size:16px;font-weight:500;letter-spacing:0.06em;color:var(--muted);margin-bottom:1.5rem}
h1 span{color:var(--accent)}
.summary-bar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.metric{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:.875rem 1rem}
.metric-label{font-size:10px;color:var(--muted);margin-bottom:6px;font-family:var(--mono);letter-spacing:0.05em;text-transform:uppercase}
.metric-value{font-size:18px;font-weight:500;font-family:var(--mono)}
.metric-value.pos{color:var(--green)}.metric-value.neg{color:var(--red)}.metric-value.neutral{color:var(--text)}.metric-value.small{font-size:13px}
.chart-section{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1.25rem}
.chart-wrap{position:relative;width:100%;height:220px}
.groups-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:1.25rem}
.group-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:.875rem 1rem;transition:border-color .2s}
.group-card.active{border-color:var(--border2)}.group-card.inactive{opacity:0.45}
.group-header{display:flex;align-items:center;gap:8px;margin-bottom:.75rem}
.group-num{font-family:var(--mono);font-size:11px;color:var(--muted);min-width:30px}
.type-sel{font-size:12px;padding:3px 8px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--surface2);color:var(--text);font-family:var(--sans);cursor:pointer}
.type-sel.call{border-color:rgba(79,142,247,0.4);color:var(--accent)}.type-sel.put{border-color:rgba(247,201,72,0.4);color:var(--amber)}
.enable-toggle{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);cursor:pointer}
.enable-toggle input{accent-color:var(--accent);width:13px;height:13px;cursor:pointer}
.maxloss-badge{font-family:var(--mono);font-size:11px;color:var(--red);margin-left:auto}
.leg-block{border-radius:var(--radius);padding:.5rem .625rem;margin-bottom:.375rem}
.leg-block.sell{background:var(--sell-bg);border:0.5px solid var(--sell-border)}.leg-block.buy{background:var(--buy-bg);border:0.5px solid var(--buy-border)}
.leg-title{font-size:10px;font-weight:500;margin-bottom:.375rem;font-family:var(--mono);letter-spacing:0.04em}
.leg-title.sell{color:var(--red)}.leg-title.buy{color:var(--green)}
.leg-head{display:grid;grid-template-columns:1fr 1fr 52px;gap:4px;margin-bottom:3px}
.leg-head span{font-size:9px;color:var(--muted);font-family:var(--mono)}
.leg-row{display:grid;grid-template-columns:1fr 1fr 52px;gap:4px;margin-bottom:3px}
.leg-row input{font-size:12px;padding:4px 6px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--surface2);color:var(--text);width:100%;font-family:var(--mono);transition:border-color .15s}
.leg-row input:focus{outline:none;border-color:var(--accent)}
.leg-row input::placeholder{color:var(--muted);font-size:11px}
@media(max-width:640px){.groups-grid{grid-template-columns:1fr}.summary-bar{grid-template-columns:repeat(2,1fr)}body{padding:1rem}}
</style>
</head>
<body>
<h1>NIKKEI OPTION / <span>損益シミュレーター</span></h1>
<div class="summary-bar">
  <div class="metric"><div class="metric-label">NET PREMIUM</div><div class="metric-value neutral" id="m-net">¥0</div></div>
  <div class="metric"><div class="metric-label">MAX PROFIT</div><div class="metric-value pos" id="m-maxp">¥0</div></div>
  <div class="metric"><div class="metric-label">MAX LOSS</div><div class="metric-value neg" id="m-maxl">¥0</div></div>
  <div class="metric"><div class="metric-label">BREAKEVEN</div><div class="metric-value neutral small" id="m-be">-</div></div>
</div>
<div class="chart-section"><div class="chart-wrap"><canvas id="mainChart"></canvas></div></div>
<div class="groups-grid" id="groupsContainer"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const MULT=1000,NUM_GROUPS=8;
const state=Array.from({length:NUM_GROUPS},(_,i)=>({enabled:true,type:i<4?'コール':'プット',sell:[{k:'',p:'',q:'1'},{k:'',p:'',q:'1'}],buy:[{k:'',p:'',q:'1'},{k:'',p:'',q:'1'}]}));
function plAtExpiry(S,g){if(!g.enabled)return 0;const ot=g.type==='コール'?'C':'P';let pnl=0;g.sell.forEach(r=>{const k=+r.k,p=+r.p,q=+r.q;if(!k||!q)return;pnl+=-(ot==='C'?Math.max(S-k,0):Math.max(k-S,0)-p)*q});g.buy.forEach(r=>{const k=+r.k,p=+r.p,q=+r.q;if(!k||!q)return;pnl+=(ot==='C'?Math.max(S-k,0):Math.max(k-S,0)-p)*q});return pnl*MULT}
function totalPL(S){return state.reduce((acc,g)=>acc+plAtExpiry(S,g),0)}
function getRange(){let allK=[];state.forEach(g=>{if(!g.enabled)return;[...g.sell,...g.buy].forEach(r=>{if(+r.k)allK.push(+r.k)})});if(!allK.length)return{min:53000,max:60000,step:50};const mn=Math.min(...allK),mx=Math.max(...allK),pad=(mx-mn)||3000;return{min:Math.round((mn-pad*0.7)/50)*50,max:Math.round((mx+pad*0.7)/50)*50,step:50}}
function buildData(){const{min,max,step}=getRange();const pts=[];for(let s=min;s<=max;s+=step)pts.push(s);return{pts,vals:pts.map(totalPL)}}
function fmt(v){return(v>=0?'+':'')+Math.round(v).toLocaleString()+'円'}
function updateSummary(pts,vals){const maxP=Math.max(...vals,0),maxL=Math.min(...vals,0);let net=0;state.forEach(g=>{if(!g.enabled)return;g.sell.forEach(r=>{if(+r.k&&+r.p&&+r.q)net-=+r.p*+r.q*MULT});g.buy.forEach(r=>{if(+r.k&&+r.p&&+r.q)net+=+r.p*+r.q*MULT})});document.getElementById('m-net').textContent=fmt(net);document.getElementById('m-net').className='metric-value '+(net>=0?'pos':'neg');document.getElementById('m-maxp').textContent='+'+Math.round(maxP).toLocaleString()+'円';document.getElementById('m-maxl').textContent=Math.round(maxL).toLocaleString()+'円';const bes=[];for(let i=0;i<vals.length-1;i++){if((vals[i]<0&&vals[i+1]>=0)||(vals[i]>=0&&vals[i+1]<0))bes.push(Math.round((pts[i]+pts[i+1])/2))}document.getElementById('m-be').textContent=bes.length>=2?bes[0].toLocaleString()+' / '+bes[bes.length-1].toLocaleString():bes.length===1?bes[0].toLocaleString():'-'}
let chart=null;
function renderChart(){const{pts,vals}=buildData();updateSummary(pts,vals);const colors=vals.map(v=>v>=0?'rgba(62,207,142,0.75)':'rgba(247,110,110,0.75)'),yAbs=Math.max(...vals.map(Math.abs),1)*1.25;if(chart){chart.data.labels=pts;chart.data.datasets[0].data=vals;chart.data.datasets[0].backgroundColor=colors;chart.options.scales.y.min=-yAbs;chart.options.scales.y.max=yAbs;chart.update('none')}else{chart=new Chart(document.getElementById('mainChart'),{type:'bar',data:{labels:pts,datasets:[{data:vals,backgroundColor:colors,borderWidth:0,barPercentage:1,categoryPercentage:1}]},options:{responsive:true,maintainAspectRatio:false,animation:{duration:120},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fmt(c.parsed.y)},backgroundColor:'#1e2333',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,titleColor:'#7b8099',bodyColor:'#e8eaf0',padding:8}},scales:{x:{ticks:{maxTicksLimit:8,color:'#7b8099',font:{family:"'IBM Plex Mono'",size:10},callback:(_,i)=>pts[i]!=null?pts[i].toLocaleString():''},grid:{display:false},border:{color:'rgba(255,255,255,0.08)'}},y:{min:-yAbs,max:yAbs,ticks:{color:'#7b8099',font:{family:"'IBM Plex Mono'",size:10},callback:v=>(v>=0?'+':'')+Math.round(v/1000)+'K'},grid:{color:'rgba(255,255,255,0.05)'},border:{color:'rgba(255,255,255,0.08)'}}}}})}}
function groupMaxLoss(g){const{pts}=buildData();return Math.min(...pts.map(s=>plAtExpiry(s,g)),0)}
function buildGroups(){const container=document.getElementById('groupsContainer');container.innerHTML='';state.forEach((g,gi)=>{const typeClass=g.type==='コール'?'call':'put',card=document.createElement('div');card.className='group-card '+(g.enabled?'active':'inactive');card.id='card-'+gi;card.innerHTML=`<div class="group-header"><span class="group-num">#${gi+1}</span><select class="type-sel ${typeClass}" data-gi="${gi}"><option${g.type==='コール'?' selected':''}>コール</option><option${g.type==='プット'?' selected':''}>プット</option></select><span class="maxloss-badge" id="ml-${gi}">${Math.round(groupMaxLoss(g)).toLocaleString()}円</span><label class="enable-toggle"><input type="checkbox" data-gi="${gi}" data-role="enable" ${g.enabled?'checked':''}>有効</label></div><div class="leg-block sell"><div class="leg-title sell">SELL</div><div class="leg-head"><span>行使価格</span><span>プレミアム</span><span>枚数</span></div>${g.sell.map((r,ri)=>`<div class="leg-row"><input type="number" step="50" placeholder="57000" value="${r.k}" data-gi="${gi}" data-role="sell-k" data-ri="${ri}"><input type="number" step="1" placeholder="200" value="${r.p}" data-gi="${gi}" data-role="sell-p" data-ri="${ri}"><input type="number" step="1" min="1" value="${r.q}" data-gi="${gi}" data-role="sell-q" data-ri="${ri}"></div>`).join('')}</div><div class="leg-block buy"><div class="leg-title buy">BUY</div><div class="leg-head"><span>行使価格</span><span>プレミアム</span><span>枚数</span></div>${g.buy.map((r,ri)=>`<div class="leg-row"><input type="number" step="50" placeholder="58000" value="${r.k}" data-gi="${gi}" data-role="buy-k" data-ri="${ri}"><input type="number" step="1" placeholder="100" value="${r.p}" data-gi="${gi}" data-role="buy-p" data-ri="${ri}"><input type="number" step="1" min="1" value="${r.q}" data-gi="${gi}" data-role="buy-q" data-ri="${ri}"></div>`).join('')}</div>`;container.appendChild(card)});container.addEventListener('input',e=>{const el=e.target,gi=+el.dataset.gi;if(isNaN(gi))return;const role=el.dataset.role,ri=+el.dataset.ri;if(role==='enable'){state[gi].enabled=el.checked;document.getElementById('card-'+gi).className='group-card '+(el.checked?'active':'inactive')}else if(el.tagName==='SELECT'){state[gi].type=el.value;el.className='type-sel '+(el.value==='コール'?'call':'put')}else if(role==='sell-k')state[gi].sell[ri].k=el.value;else if(role==='sell-p')state[gi].sell[ri].p=el.value;else if(role==='sell-q')state[gi].sell[ri].q=el.value;else if(role==='buy-k')state[gi].buy[ri].k=el.value;else if(role==='buy-p')state[gi].buy[ri].p=el.value;else if(role==='buy-q')state[gi].buy[ri].q=el.value;renderChart();state.forEach((_,i)=>{const e2=document.getElementById('ml-'+i);if(e2)e2.textContent=Math.round(groupMaxLoss(state[i])).toLocaleString()+'円'})})}
buildGroups();renderChart();
</script>
</body>
</html>
